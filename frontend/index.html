<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI — 세대를 잇는 건강한 응원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>

  <!-- GNB (비로그인 상태) -->
  <header class="gnb">
    <div class="gnb-logo">지지</div>
    <div class="gnb-right">
      <a href="/html/login.html" class="gnb-btn">로그인</a>
      <a href="/html/register.html" class="gnb-btn gnb-btn-solid">회원가입</a>
    </div>
  </header>

  <!-- 메인 섹션 -->
  <div class="container" style="padding-top:3rem;padding-bottom:3rem;">
    <div class="card" style="padding:3rem;text-align:center;">
      <div style="font-size:var(--font-size-xs);font-weight:500;color:var(--color-primary);letter-spacing:0.08em;margin-bottom:0.75rem;">GENERATION TO GENERATION</div>
      <h1 style="font-size:var(--font-size-2xl);font-weight:500;line-height:1.4;margin-bottom:0.75rem;">세대를 잇는<br>건강한 응원</h1>
      <p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);line-height:1.7;margin-bottom:2rem;">
        시니어의 건강 루틴을 기록하고<br>
        가족·친구와 함께 지지하는 웰니스 커뮤니티
      </p>
      <div style="display:flex;justify-content:center;gap:0.75rem;margin-bottom:2rem;">
        <a href="/html/register.html" class="btn btn-primary">회원가입 시작하기</a>
        <a href="/html/login.html" class="btn btn-outline">로그인</a>
      </div>
      <div style="display:flex;justify-content:center;gap:1.5rem;">
        <span style="display:flex;align-items:center;gap:0.4rem;font-size:var(--font-size-xs);color:var(--color-text-secondary);">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--color-success);"></span>루틴 체크
        </span>
        <span style="display:flex;align-items:center;gap:0.4rem;font-size:var(--font-size-xs);color:var(--color-text-secondary);">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--color-primary);"></span>가족 연결
        </span>
        <span style="display:flex;align-items:center;gap:0.4rem;font-size:var(--font-size-xs);color:var(--color-text-secondary);">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--color-ai);"></span>AI 추천
        </span>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
</body>
</html>
