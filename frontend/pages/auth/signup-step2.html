<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 회원가입 2단계</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/auth/auth.css">
</head>
<body data-section="auth">
  <main>
    <div class="container auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <div class="section-eyebrow">Signup 2</div>
          <h1 class="section-title">닉네임을 정해요</h1>
          <p class="section-copy">이메일 앞부분을 추천 닉네임으로 미리 보여줍니다.</p>
        </div>
        <div id="nickname-preview" class="auth-summary">추천 닉네임을 불러오는 중입니다.</div>
        <label class="input-label" for="signup-nickname">닉네임</label>
        <input id="signup-nickname" class="input-field" type="text" placeholder="닉네임을 입력하세요">
        <div class="page-actions">
          <a href="/pages/auth/signup-done.html" class="btn btn-primary btn-full">가입 완료</a>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/auth/auth.js"></script>
</body>
</html>
