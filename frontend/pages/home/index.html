<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 홈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/home/home.css">
</head>
<body data-section="home">
  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="title-stack">
            <h1 class="page-title">오늘 우리의 지지</h1>
            <p id="home-greeting" class="page-subtitle">안녕하세요</p>
          </div>
          <span id="home-date" class="badge badge-blue"></span>
        </div>
      </header>

      <!-- 카드1: 오늘 받은 지지 -->
      <section class="card" style="margin-bottom:0.75rem;">
        <strong>👍 오늘 받은 지지</strong>
        <div id="received-support-list" class="home-list">
          <p class="meta-text">불러오는 중…</p>
        </div>
      </section>

      <!-- 카드2: 오늘 조용한 모임원 -->
      <section class="card" style="margin-bottom:0.75rem;">
        <strong>🤫 오늘 조용한 모임원</strong>
        <p class="meta-text">최근 활동이 뜸한 모임원에게 먼저 지지를 보내보세요.</p>
        <div id="quiet-member-list" class="home-list">
          <p class="meta-text">불러오는 중…</p>
        </div>
      </section>

      <!-- 카드3: 이번 주 우리 -->
      <section class="card" style="margin-bottom:0.75rem;">
        <strong>📊 이번 주 우리</strong>
        <div id="weekly-summary" class="home-list">
          <p class="meta-text">불러오는 중…</p>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/home/home.js"></script>
</body>
</html>
