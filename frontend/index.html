<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI — 세대를 잇는 건강한 응원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <style>
    /* 랜딩 — 핵심 기능 3가지 원형 배치 (외곽 원 + 라벨 위치) */
    .features-circle {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 2rem auto 0;
      border-radius: 50%;
      border: 1.5px solid var(--color-border);
    }
    .features-circle-item {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      /* 카드 배경색과 동일해서 외곽 원이 라벨 부분에서 끊어진 것처럼 보이게 */
      background: var(--color-card);
      font-size: 0.85rem;
      white-space: nowrap;
      color: var(--color-text-s);
    }
    .features-circle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .features-circle-top         { top: 0;   left: 50%; transform: translate(-50%, -50%); }
    .features-circle-bottom-left { top: 75%; left: 7%;  transform: translate(-50%, -50%); }
    .features-circle-bottom-right{ top: 75%; left: 93%; transform: translate(-50%, -50%); }
  </style>
</head>
<body>
  <header class="gnb">
    <div class="gnb-logo">지지</div>
    <div class="gnb-right">
      <a href="/pages/auth/login.html" class="gnb-btn">로그인</a>
      <a href="/pages/auth/signup-step1.html" class="gnb-btn gnb-btn-solid">회원가입</a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card" style="padding:3rem;text-align:center;">
        <div class="section-eyebrow" style="margin-bottom:0.75rem;">Generation to Generation</div>
        <h1 class="section-title" style="margin-bottom:0.75rem;">세대를 잇는<br>건강한 응원</h1>
        <p class="section-copy" style="line-height:1.7;margin-bottom:2rem;">
          나이에 맞는 건강 습관을 기록하고<br>
          가족, 친구, 이웃과 서로 지지하는 웰니스 커뮤니티
        </p>
        <div id="landing-auth-buttons">
          <div class="page-actions" style="justify-content:center;margin-bottom:2rem;">
            <a href="/pages/auth/signup-step1.html" class="btn btn-primary">회원가입 시작하기</a>
            <a href="/pages/auth/login.html" class="btn btn-outline">로그인</a>
          </div>
        </div>
        <div style="text-align:center;margin-bottom:1rem;">
          <a id="invite-btn" href="/pages/auth/invite-signup.html" class="btn btn-outline btn-sm">초대코드로 시작하기</a>
        </div>
        <div class="features-circle">
          <span class="features-circle-item features-circle-top">
            <span class="features-circle-dot" style="background:var(--color-success);"></span>습관 체크
          </span>
          <span class="features-circle-item features-circle-bottom-left">
            <span class="features-circle-dot" style="background:var(--color-primary);"></span>모임 지지
          </span>
          <span class="features-circle-item features-circle-bottom-right">
            <span class="features-circle-dot" style="background:var(--color-ai);"></span>AI 추천
          </span>
        </div>
      </div>
    </div>
  </main>

  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script>
    if (isLoggedIn()) {
      document.getElementById('landing-auth-buttons').style.display = 'none';
      document.getElementById('invite-btn').href = '/pages/support/join.html';
    }
  </script>
</body>
</html>
