<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 이웃 피드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/neighbor/neighbor.css">
</head>
<body data-section="neighbor">
  <header class="gnb">
    <div class="gnb-logo">지지</div>
    <nav class="gnb-nav">
      <a href="/pages/today/index.html" data-nav="today">오늘</a>
      <a href="/pages/habits/index.html" data-nav="habits">습관</a>
      <a href="/pages/support/index.html" data-nav="support">지지</a>
      <a href="/pages/neighbor/feed.html" data-nav="neighbor">이웃</a>
      <a href="/pages/settings/index.html" data-nav="settings">설정</a>
    </nav>
    <div class="gnb-right"><span id="gnb-username" class="gnb-user">사용자님</span></div>
  </header>
  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div class="section-eyebrow">Neighbor Feed</div>
        <h1 class="page-title">이웃과 나누는 습관</h1>
        <p class="page-subtitle">습관 공유 피드와 group-search 화면은 같은 이웃 도메인 아래에서 관리합니다.</p>
      </header>
      <div class="filter-tabs">
        <button class="chip active">전체</button>
        <button class="chip">운동</button>
        <button class="chip">복약</button>
        <button class="chip">식단</button>
      </div>
      <section class="feed-list">
        <article class="feed-card">
          <strong>아침 걷기 완료</strong>
          <p class="section-copy" style="margin-top:0.5rem;">오늘도 10분 걸었어요. 날씨가 좋아서 기분이 좋네요.</p>
          <div class="page-actions" style="margin-top:1rem;">
            <button type="button" class="btn btn-outline btn-sm support-toggle">지지하기</button>
          </div>
        </article>
      </section>
      <div class="page-actions">
        <a href="/pages/neighbor/group-search.html" class="btn btn-outline">모임 구해요 보기</a>
        <a href="/pages/neighbor/my-posts.html" class="btn btn-outline">내 글 보기</a>
      </div>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/neighbor/neighbor.js"></script>
