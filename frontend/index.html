<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI — 세대를 잇는 건강한 응원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
</head>
<body>
  <header class="gnb">
    <div class="gnb-logo">지지</div>
    <div class="gnb-right">
      <a href="/pages/auth/login.html" class="gnb-btn">로그인</a>
      <a href="/pages/auth/signup-step1.html" class="gnb-btn gnb-btn-solid">회원가입</a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card" style="padding:3rem;text-align:center;">
        <div class="section-eyebrow" style="margin-bottom:0.75rem;">Generation to Generation</div>
        <h1 class="section-title" style="margin-bottom:0.75rem;">세대를 잇는<br>건강한 응원</h1>
        <p class="section-copy" style="line-height:1.7;margin-bottom:2rem;">
          나이에 맞는 건강 습관을 기록하고<br>
          가족, 친구, 이웃과 서로 지지하는 웰니스 커뮤니티
        </p>
        <div class="page-actions" style="justify-content:center;margin-bottom:2rem;">
          <a href="/pages/auth/signup-step1.html" class="btn btn-primary">회원가입 시작하기</a>
          <a href="/pages/auth/login.html" class="btn btn-outline">로그인</a>
        </div>
        <div style="display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;">
          <span class="meta-text" style="display:flex;align-items:center;gap:0.4rem;">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--color-success);"></span>습관 체크
          </span>
          <span class="meta-text" style="display:flex;align-items:center;gap:0.4rem;">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--color-primary);"></span>모임 지지
          </span>
          <span class="meta-text" style="display:flex;align-items:center;gap:0.4rem;">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--color-ai);"></span>AI 추천
          </span>
        </div>
      </div>
    </div>
  </main>

  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
</body>
</html>
