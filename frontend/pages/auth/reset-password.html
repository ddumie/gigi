<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 비밀번호 재설정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/auth/auth.css">
</head>
<body data-section="auth">
  <main>
    <div class="container auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <div class="section-eyebrow">New Password</div>
          <h1 class="section-title">새 비밀번호 설정</h1>
          <p class="section-copy">새로 사용할 비밀번호를 입력해주세요.</p>
        </div>

        <div id="reset-invalid" class="hidden">
          <p class="auth-notice">
            유효하지 않거나 만료된 링크입니다.<br>
            다시 요청해주세요.
          </p>
          <div class="auth-links">
            <a href="/pages/auth/forgot-password.html">비밀번호 찾기 다시 요청</a>
          </div>
        </div>

        <div id="reset-form">
          <label class="input-label" for="reset-new-password">새 비밀번호</label>
          <div class="pw-input-wrap">
            <input id="reset-new-password" class="input-field" type="password" placeholder="6자 이상 18자 이하">
            <button type="button" class="pw-toggle-btn" onclick="togglePwVisibility('reset-new-password', this)" aria-label="비밀번호 보기">
              <svg class="pw-eye-icon pw-eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="pw-eye-icon pw-eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div id="reset-new-password-error" class="input-error hidden"></div>

          <label class="input-label" for="reset-new-password-confirm">새 비밀번호 확인</label>
          <div class="pw-input-wrap">
            <input id="reset-new-password-confirm" class="input-field" type="password" placeholder="비밀번호를 다시 입력하세요">
            <button type="button" class="pw-toggle-btn" onclick="togglePwVisibility('reset-new-password-confirm', this)" aria-label="비밀번호 보기">
              <svg class="pw-eye-icon pw-eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="pw-eye-icon pw-eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div id="reset-new-password-confirm-error" class="input-error hidden"></div>

          <div class="page-actions">
            <button id="reset-submit" class="btn btn-primary btn-full">비밀번호 변경</button>
          </div>
        </div>

        <div class="auth-links">
          <a href="/pages/auth/login.html">로그인으로 돌아가기</a>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/auth/auth.js"></script>
</body>
</html>
