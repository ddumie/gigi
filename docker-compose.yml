services:
  # 데이터베이스 서비스
  db:
    image: postgres:16
    container_name: gigi-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gigi-network

  # 백엔드/프론트엔드 통합 앱 서비스
  app:
    build: .
    container_name: gigi-app
    restart: always
    depends_on:
      - db
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - gigi-network

  # Nginx 웹 서버 (프론트엔드 + 리버스 프록시)
  nginx:
    image: nginx:alpine
    container_name: gigi-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - gigi-network

volumes:
  postgres_data:

networks:
  gigi-network:
    driver: bridge