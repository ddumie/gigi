<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 습관</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/habits/habits.css">
</head>
<body data-section="habits">
  <div class="font-scaler">
    <span>글씨 크기</span>
    <input id="font-scale-slider" type="range" min="0" max="6" step="1">
    <span id="font-scale-value">기본</span>
  </div>
  <main>
    <div class="container page-shell">
      <header class="page-header habits-index-header">
        <div>
          <div style="font-size:1rem;font-weight:500;">내 습관 관리</div>
          <p id="habit-count" class="meta-text">습관을 불러오는 중...</p>
        </div>
        <div class="page-actions">
          <a href="/pages/habits/ai-recommend.html" class="btn btn-ai">맞춤 습관 추천</a>
          <button id="btn-add-habit" class="btn btn-primary">+ 습관 추가</button>
        </div>
      </header>

      <!-- 카테고리 필터 -->
      <div class="filter-tabs">
        <button class="chip active" data-habit-filter="">전체</button>
        <button class="chip" data-habit-filter="운동">운동</button>
        <button class="chip" data-habit-filter="복약">복약</button>
        <button class="chip" data-habit-filter="식단">식단</button>
        <button class="chip" data-habit-filter="수면">수면</button>
        <button class="chip" data-habit-filter="기타">기타</button>
      </div>

      <!-- 습관 목록 (JS에서 동적 렌더링) -->
      <section id="habit-list" class="habit-list"></section>

      <!-- 첫 진입 모달 (화면 8: 첫 습관 등록 직후 모임 유도) -->
      <div id="first-habit-overlay" class="first-habit-overlay">
        <section class="card first-habit-modal-card">
          <div style="font-size:1.5rem;margin-bottom:0.5rem;">🎉</div>
          <div style="font-size:1rem;font-weight:500;margin-bottom:0.4rem;">습관이 등록됐어요!</div>
          <div style="font-size:0.85rem;color:var(--color-text-s);margin-bottom:1.2rem;line-height:1.7;">
            함께하면 더 오래 지속돼요.<br>가족이나 친구를 초대해 모임을 만들어볼까요?
          </div>
          <div style="background:var(--color-success-light);border-radius:var(--r-md);padding:0.75rem;margin-bottom:1rem;font-size:0.8rem;color:#0D6B4F;">
            모임을 만들면 서로의 습관을 응원하고,<br>함께할수록 칭호와 레벨이 올라가요 🌱
          </div>
          <a href="/pages/support/create.html" class="btn btn-primary btn-full" style="margin-bottom:0.4rem;">모임 만들기</a>
          <button id="dismiss-first-habit-modal" class="btn btn-outline btn-full btn-sm" type="button">나중에 할게요</button>
        </section>
      </div>

    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/habits/habits.js"></script>
</body>
</html>
