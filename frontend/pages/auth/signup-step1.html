<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 회원가입 1단계</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/auth/auth.css">
</head>
<body data-section="auth">
  <main>
    <div class="container auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <div class="section-eyebrow">Signup 1</div>
          <h1 class="section-title">계정 정보를 입력해요</h1>
          <p class="section-copy">이메일은 중복 없이, 비밀번호는 6자 이상으로 입력합니다.</p>
        </div>
        <label class="input-label" for="signup-email">이메일</label>
        <input id="signup-email" class="input-field" type="email" placeholder="gigi@example.com">
        <div id="email-error" class="input-error hidden"></div>
        <label class="input-label" for="signup-password">비밀번호</label>
        <div class="pw-input-wrap">
          <input id="signup-password" class="input-field" type="password" placeholder="6자 이상 18자 이하">
          <button type="button" class="pw-toggle-btn" onclick="togglePwVisibility('signup-password', this)" aria-label="비밀번호 보기">
            <svg class="pw-eye-icon pw-eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="pw-eye-icon pw-eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div id="password-error" class="input-error hidden"></div>
        <label class="input-label" for="signup-password-confirm">비밀번호 확인</label>
        <div class="pw-input-wrap">
          <input id="signup-password-confirm" class="input-field" type="password" placeholder="비밀번호를 다시 입력하세요">
          <button type="button" class="pw-toggle-btn" onclick="togglePwVisibility('signup-password-confirm', this)" aria-label="비밀번호 보기">
            <svg class="pw-eye-icon pw-eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="pw-eye-icon pw-eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div id="password-confirm-error" class="input-error hidden"></div>
        <div class="page-actions">
          <button id="step1-next" class="btn btn-primary btn-full">다음으로</button>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/auth/auth.js"></script>
</body>
</html>
