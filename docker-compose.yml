version: '3.8'

services:
  # 데이터베이스 서비스
  db:
    image: postgres:15
    container_name: gigi-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gigi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gigi1234}
      POSTGRES_DB: ${POSTGRES_DB:-gigi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 백엔드/프론트엔드 통합 앱 서비스
  app:
    build: .
    container_name: gigi-app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker 네트워크 내부에서는 서비스 이름인 'db'로 접근 가능
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gigi}:${POSTGRES_PASSWORD:-gigi1234}@db:5432/${POSTGRES_DB:-gigi_db}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  postgres_data: