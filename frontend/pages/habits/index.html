<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 습관</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/habits/habits.css">
</head>
<body data-section="habits">
  <div class="font-scaler">
    <span>글씨 크기</span>
    <input id="font-scale-slider" type="range" min="0" max="6" step="1">
    <span id="font-scale-value">기본</span>
  </div>
  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div style="font-size:1rem;font-weight:500;">내 습관 관리</div>
        <p id="habit-count" class="meta-text">습관을 불러오는 중...</p>
      </header>

      <!-- 카테고리 필터 -->
      <div class="filter-tabs">
        <button class="chip active" data-habit-filter="">전체</button>
        <button class="chip" data-habit-filter="운동">운동</button>
        <button class="chip" data-habit-filter="복약">복약</button>
        <button class="chip" data-habit-filter="식단">식단</button>
        <button class="chip" data-habit-filter="수면">수면</button>
        <button class="chip" data-habit-filter="기타">기타</button>
      </div>

      <!-- AI 습관 추천 배너 -->
      <div class="card ai-box" style="margin-bottom:1rem;">
        <strong>AI 습관 추천</strong>
        <p class="meta-text" style="margin-top:0.25rem;">관심사를 바탕으로 새로운 습관을 추천받아보세요</p>
        <a href="/pages/onboarding/step3-ai.html" class="btn btn-ai btn-sm" style="margin-top:0.5rem;">AI 추천받기</a>
      </div>

      <!-- 습관 목록 (JS에서 동적 렌더링) -->
      <section id="habit-list" class="habit-list"></section>

      <!-- 습관 추가 버튼 -->
      <button id="btn-add-habit" class="btn btn-primary btn-full" style="margin-top:1rem;">+ 습관 추가</button>

      <!-- 습관 추가/수정 모달 -->
      <div id="habit-modal" class="modal" style="display:none;">
        <div class="modal-content card">
          <strong id="modal-title">습관 추가</strong>
          <input id="modal-habit-title" class="input" type="text" placeholder="습관 이름" maxlength="100">
          <select id="modal-habit-category" class="input">
            <option value="운동">운동</option>
            <option value="복약">복약</option>
            <option value="식단">식단</option>
            <option value="수면">수면</option>
            <option value="기타">기타</option>
          </select>
          <input id="modal-habit-time" class="input" type="time" placeholder="시간 (선택)">
          <select id="modal-habit-repeat" class="input">
            <option value="매일">매일</option>
            <option value="평일">평일</option>
            <option value="주말">주말</option>
            <option value="주1회">주1회</option>
            <option value="주3회">주3회</option>
          </select>
          <div class="page-actions" style="margin-top:1rem;">
            <button id="modal-save" class="btn btn-primary">저장</button>
            <button id="modal-cancel" class="btn btn-outline">취소</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/habits/habits.js"></script>
</body>
</html>
