<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 모임 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/support/support.css">
</head>
<body data-section="support">

  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div class="section-eyebrow">Manage Group</div>
        <h1 class="page-title">모임 관리</h1>
        <p class="page-subtitle">모임 정보, 초대 코드, 멤버 목록, 탈퇴 액션을 한 곳에서 관리합니다.</p>
      </header>
      <section class="card invite-code-box">
        <strong>초대 코드</strong>
        <div class="section-title" style="font-size:var(--font-size-xl);margin-top:0.5rem;">GIGI-2026</div>
      </section>
      <section class="card">
        <strong>모임 멤버</strong>
        <div class="member-list" style="margin-top:1rem;">
          <div class="member-row"><span>김건강님</span><span class="meta-text">오너</span></div>
          <div class="member-row"><span>이웃사촌님</span><span class="meta-text">멤버</span></div>
        </div>
      </section>
      <section class="card">
        <strong>모임 탈퇴</strong>
        <p class="section-copy" style="margin-top:0.5rem;">탈퇴 시 해당 모임에서 받은 습관은 내 습관 탭에서 자동 삭제됩니다.</p>
        <div class="page-actions" style="margin-top:1rem;">
          <button type="button" class="btn btn-outline">모임 탈퇴</button>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/support/support.js"></script>
  <script src="/features/support/manage.js"></script>
</body>
</html>
