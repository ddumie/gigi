<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 모임 구해요 글쓰기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/neighbor/neighbor.css">
</head>
<body data-section="neighbor">
  <header class="gnb">
    <div class="gnb-logo">지지</div>
    <nav class="gnb-nav">
      <a href="/pages/today/index.html" data-nav="today">오늘</a>
      <a href="/pages/habits/index.html" data-nav="habits">습관</a>
      <a href="/pages/support/index.html" data-nav="support">지지</a>
      <a href="/pages/neighbor/feed.html" data-nav="neighbor">이웃</a>
      <a href="/pages/settings/index.html" data-nav="settings">설정</a>
    </nav>
    <div class="gnb-right"><span id="gnb-username" class="gnb-user">사용자님</span></div>
  </header>
  <main>
    <div class="container auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <div class="section-eyebrow">Write Group Search</div>
          <h1 class="section-title">모임 구해요 글쓰기</h1>
          <p class="section-copy">모임 유형, 함께할 습관, 빈도를 입력해 함께할 이웃을 찾아요.</p>
        </div>
        <form id="group-search-form">
          <select id="group_type" class="input-field">
            <option value="">모임 유형 선택</option>
            <option value="가족">가족</option>
            <option value="친구">친구</option>
            <option value="건강 챌린지">건강 챌린지</option>
            <option value="이웃">이웃</option>
          </select>
          <input id="title" class="input-field" type="text" placeholder="제목">
          <textarea id="description" class="input-field" rows="5" placeholder="함께하고 싶은 이유를 적어주세요"></textarea>
          <input id="habit_title" class="input-field" type="text" placeholder="함께할 습관 1개">
          <input id="frequency" class="input-field" type="text" placeholder="빈도 예: 매일, 주 3회">
          <select id="category" class="input-field">
            <option value="">카테고리 선택 (선택사항)</option>
            <option value="운동">운동</option>
            <option value="복약">복약</option>
            <option value="식단">식단</option>
            <option value="수면">수면</option>
            <option value="기타">기타</option>
          </select>
          <button id="submit-btn" class="btn btn-primary btn-full">글 등록하기</button>
        </form>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/neighbor/neighbor.js"></script>
  <script src="/features/neighbor/button.js"></script>

</body>
</html>
