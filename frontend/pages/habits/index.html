<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 습관</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/habits/habits.css">
</head>
<body data-section="habits">
  <header class="gnb">
    <div class="gnb-logo">지지</div>
    <nav class="gnb-nav">
      <a href="/pages/today/index.html" data-nav="today">오늘</a>
      <a href="/pages/habits/index.html" data-nav="habits">습관</a>
      <a href="/pages/support/index.html" data-nav="support">지지</a>
      <a href="/pages/neighbor/feed.html" data-nav="neighbor">이웃</a>
      <a href="/pages/settings/index.html" data-nav="settings">설정</a>
    </nav>
    <div class="gnb-right"><span id="gnb-username" class="gnb-user">사용자님</span></div>
  </header>
  <div class="font-scaler">
    <span>글씨 크기</span>
    <input id="font-scale-slider" type="range" min="0" max="6" step="1">
    <span id="font-scale-value">기본</span>
  </div>
  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div class="section-eyebrow">Habits</div>
        <h1 class="page-title">내 습관 관리</h1>
        <p class="page-subtitle">개인 습관과 모임 습관을 한 곳에서 정리합니다.</p>
      </header>
      <div class="filter-tabs">
        <button class="chip active" data-habit-filter>전체</button>
        <button class="chip" data-habit-filter>운동</button>
        <button class="chip" data-habit-filter>복약</button>
        <button class="chip" data-habit-filter>식단</button>
      </div>
      <section class="habit-list">
        <article class="habit-item">
          <div class="habit-item-head">
            <strong>아침 10분 걷기</strong>
            <div class="habit-item-meta"><span class="badge badge-blue">운동</span></div>
          </div>
          <p class="meta-text">매일 07:30 · 개인 습관</p>
        </article>
        <article class="habit-item">
          <div class="habit-item-head">
            <strong>함께 물 마시기</strong>
            <div class="habit-item-meta"><span class="badge badge-green">모임</span><span class="badge badge-amber">식단</span></div>
          </div>
          <p class="meta-text">매일 10:00 · 모임 연동 습관</p>
        </article>
      </section>
      <section class="card">
        <strong>AI 습관 추천</strong>
        <p class="section-copy" style="margin-top:0.5rem;">관심사 기준으로 새 습관을 다시 추천받을 수 있어요.</p>
        <div class="page-actions" style="margin-top:1rem;">
          <a href="/pages/onboarding/step3-ai.html" class="btn btn-ai">AI 추천받기</a>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/habits/habits.js"></script>
</body>
</html>
