<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 지지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/support/support.css?v=001">
</head>
<body data-section="support">
  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div>
          <div class="section-eyebrow">Support</div>
          <h1 class="page-title">우리의 지지</h1>
          <p class="page-subtitle">모임 게이지, 스트릭, 멤버 지지를 한 곳에서 확인합니다.</p>
        </div>
        <div class="page-actions">
          <a href="/pages/support/join.html" class="btn btn-primary">모임 가입하기</a>
          <a href="/pages/support/create.html" class="btn btn-primary">+ 모임 만들기</a>
        </div>
      </header>
      <section class="group-list">
        <article class="card group-card">
          <!-- 카드 헤더 -->
          <div class="group-card-header">
            <div class="group-title">
              <strong>우리 가족</strong>
            </div>
            <div class="group-actions">
              <span class="group-type badge">가족</span>
              <a href="/pages/support/manage.html" class="btn btn-outline btn-sm">모임 관리</a>
            </div>
          </div>
          <!-- 레벨 & 스트릭 박스 -->
          <div class="group-stats">
            <!-- 첫 번째 stat-box: 그룹 레벨 -->
            <div class="stat-box">
              <div class="stat-row">
                <span class="stat-icon">🌳</span>
                <div>
                  <div class="stat-main">나무 레벨 · 247회</div>
                  <div class="stat-sub">다음 레벨까지 23회 남음</div>
                </div>
              </div>
            </div>

            <!-- 두 번째 stat-box: 스트릭 -->
            <div class="stat-box">
              <div class="stat-row">
                <span class="stat-icon">🔥</span>
                <div>
                  <div class="stat-main">연속 지지 스트릭 · 5일</div>
                  <div class="stat-sub">최고 기록 12일</div>
                </div>
              </div>
            </div>
          </div>


          <!-- 멤버 리스트 -->
          <div class="member-list">
            <div class="member-row">
              <!-- 프로필 글상자 -->
              <div class="member-avatar">김</div>

              <!-- 이름 + 진행바 -->
              <div class="member-info">
                <div class="member-name">김건강님</div>
                <div class="member-progress">
                  <div class="progress-bar green" style="width:100%;"></div>
                </div>
              </div>

              <!-- 지지하기 버튼 -->
              <button type="button" class="btn btn-outline btn-sm" data-support-button>지지하기</button>
            </div>

            <div class="member-row">
              <div class="member-avatar">이</div>
              <div class="member-info">
                <div class="member-name">이웃사촌님</div>
                <div class="member-progress">
                  <div class="progress-bar blue" style="width:60%;"></div>
                </div>
              </div>
              <button type="button" class="btn btn-outline btn-sm" data-support-button>지지하기</button>
            </div>
          </div>

        </article>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/support/support.js"></script>
</body>
</html>
