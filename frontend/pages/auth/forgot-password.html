<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 비밀번호 찾기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/auth/auth.css">
</head>
<body data-section="auth">
  <main>
    <div class="container auth-shell">
      <section class="card auth-card">
        <div class="page-header">
          <div class="section-eyebrow">Password Reset</div>
          <h1 class="section-title">비밀번호를 잊으셨나요?</h1>
          <p class="section-copy">가입하신 이메일을 입력하시면 재설정 링크를 보내드립니다.</p>
        </div>

        <div id="forgot-success" class="hidden">
          <p style="text-align:center; line-height:1.7;">
            이메일을 발송했습니다.<br>
            받은 편지함을 확인해주세요.<br>
            링크는 <strong>30분</strong>간 유효합니다.
          </p>
        </div>

        <div id="forgot-form">
          <label class="input-label" for="forgot-email">이메일</label>
          <input id="forgot-email" class="input-field" type="email" placeholder="gigi@example.com">
          <div id="forgot-email-error" class="input-error hidden"></div>
          <div class="page-actions">
            <button id="forgot-submit" class="btn btn-primary btn-full">재설정 링크 받기</button>
          </div>
        </div>

        <div class="auth-links">
          <a href="/pages/auth/login.html">로그인으로 돌아가기</a>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/auth/auth.js"></script>
</body>
</html>
