<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 피드 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/neighbor/neighbor.css">
</head>
<body data-section="neighbor">
  <main>
    <div class="container page-shell">
      <!-- 상단: 제목 + 돌아가기 버튼 -->
      <header class="page-header detail-page-header">
        <div>
          <h1 class="page-title">이웃과 나누는 습관</h1>
        </div>
        <a href="/pages/neighbor/feed.html" class="btn btn-outline btn-sm detail-back-btn">← 피드로 돌아가기</a>
      </header>

      <!-- 피드 카드 + 댓글 통합 (피드 목록과 동일한 구조) -->
      <article class="feed-card" id="feed-detail-card">
        <div id="feed-detail-content">
          <p class="meta-text">로딩 중...</p>
        </div>

        <!-- 댓글 목록 (본문 카드에 이어짐) -->
        <div id="comment-list" class="detail-comment-list"></div>

        <!-- 댓글 입력창 -->
        <section class="detail-comment-input-box">
          <textarea id="comment-input" class="comment-textarea" rows="3" placeholder="댓글을 입력하세요"></textarea>
          <div class="page-actions">
            <button id="comment-submit" class="btn btn-primary btn-sm">등록</button>
            <button id="comment-edit-submit" class="btn btn-primary btn-sm hidden">수정 완료</button>
            <button id="comment-edit-cancel" class="btn btn-outline btn-sm hidden">취소</button>
          </div>
        </section>
      </article>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/neighbor/neighbor.js"></script>
  <script src="/features/neighbor/feed-detail.js"></script>
</body>
</html>
