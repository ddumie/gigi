<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지 GIGI - 오늘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles/common.css">
  <link rel="stylesheet" href="/shared/styles/layout.css">
  <link rel="stylesheet" href="/shared/styles/components.css">
  <link rel="stylesheet" href="/features/today/today.css">
</head>
<body data-section="today">
  <div class="font-scaler">
    <span>글씨 크기</span>
    <input id="font-scale-slider" type="range" min="0" max="6" step="1">
    <span id="font-scale-value">기본</span>
  </div>
  <main>
    <div class="container page-shell">
      <header class="page-header">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div id="today-greeting" style="font-size:1.1rem;font-weight:500;">안녕하세요</div>
            <div style="font-size:0.8rem;color:var(--color-text-s);">오늘의 내 습관</div>
          </div>
          <span id="today-date" class="badge badge-blue"></span>
        </div>
      </header>

      <!-- 받은 지지 알림 (support 도메인 연동 후 동적 전환 예정) -->
      <section id="notification-section" class="card" style="margin-bottom:0.75rem;display:none;">
        <strong>👍 받은 지지</strong>
        <div id="notification-list"></div>
      </section>

      <!-- 오늘의 습관 체크리스트 -->
      <section class="card" style="margin-bottom:0.75rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <strong>✅ 오늘의 습관</strong>
          <span id="today-pill" class="badge badge-blue"></span>
        </div>
        <div id="today-checklist"></div>
        <a href="/pages/habits/index.html" class="btn btn-outline btn-full btn-sm" style="margin-top:0.5rem;">+ 습관 추가 (습관 탭으로 이동)</a>
      </section>

      <!-- 우리의 오늘 (support 도메인 연동 후 동적 전환 예정) -->
      <section class="card" style="margin-bottom:0.75rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;">
          <strong>👥 우리의 오늘</strong>
          <a href="/pages/support/index.html" class="btn btn-outline btn-sm">지지 탭 바로가기</a>
        </div>
        <p id="group-summary" class="meta-text" style="text-align:center;padding:0.5rem;">모임 정보를 불러오는 중...</p>
      </section>

      <!-- 나의 현황 -->
      <section class="card">
        <strong>📊 나의 현황</strong>
        <div class="stat-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:1rem;">
          <div class="stat-card"><div id="stat-rate"   class="stat-value">—</div><div class="stat-label">오늘 달성률</div></div>
          <div class="stat-card"><div id="stat-weekly" class="stat-value">—</div><div class="stat-label">이번 주 평균</div></div>
          <div class="stat-card"><div id="stat-streak" class="stat-value">—</div><div class="stat-label">연속 달성</div></div>
          <div class="stat-card"><div id="stat-badge"  class="stat-value" style="font-size:1rem;">🌱 씨앗</div><div class="stat-label">내 칭호</div></div>
        </div>
        <div style="font-size:0.75rem;font-weight:500;margin:0.75rem 0 0.4rem;">이번 달 습관 기록</div>
        <div id="mini-calendar" class="mini-calendar"></div>
      </section>

      <!-- 첫 로그인 모달 -->
      <section id="first-login-modal" class="card first-login-modal">
        <strong>첫 로그인이에요</strong>
        <p class="meta-text" style="margin-top:0.5rem;">모임을 만들거나 나중에 지지 탭에서 다시 시작할 수 있어요.</p>
        <div class="page-actions" style="margin-top:1rem;">
          <a href="/pages/support/create.html" class="btn btn-primary">모임 만들기</a>
          <button id="dismiss-first-login-modal" class="btn btn-outline" type="button">나중에 할게요</button>
        </div>
      </section>
    </div>
  </main>
  <script src="/shared/lib/api.js"></script>
  <script src="/shared/lib/common.js"></script>
  <script src="/features/today/today.js"></script>
</body>
</html>
